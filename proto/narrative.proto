syntax = "proto3";

package narrative;

option go_package = "random-adventures/proto/narrative";

service NarrativeService {
  rpc GenerateNarrative(GenerateNarrativeRequest) returns (GenerateNarrativeResponse);
  rpc GenerateImage(GenerateImageRequest) returns (GenerateImageResponse);
  rpc GenerateAudio(GenerateAudioRequest) returns (GenerateAudioResponse);
}

message GenerateNarrativeRequest {
  string prompt = 1;
  string tone = 2;
  repeated string history = 3;
  string language = 4;
}

message GenerateNarrativeResponse {
  string text = 1;
}

message GenerateAudioRequest {
  string text = 1;
  string language = 2;
}

message GenerateAudioResponse {
  bytes audio_data = 1;
  string mime_type = 2;
}

message GenerateImageRequest {
  string prompt = 1;
  optional string player_photo = 2;
}

message GenerateImageResponse {
  bytes image_data = 1;
}
